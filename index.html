<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculy | grade calculator</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    .final-requirements {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #f8f8fc;
      border-radius: 1rem;
      font-size: 0.75rem;
      border-left: 2px solid #ccc;
    }
    .final-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 0.5rem;
    }
    .req-table {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }
    .req-item {
      background: white;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      border: 1px solid #eee;
      font-size: 0.7rem;
    }
    .req-grade {
      font-weight: 600;
      margin-right: 0.3rem;
    }
    .req-score {
      font-family: monospace;
    }
    .impossible {
      color: #b33;
    }
    .zero {
      color: #3a6;
    }
  </style>
</head>
<body>

  <div id="startOverlay" class="start-overlay">
    <div class="start-title">Calculy</div>
    <div class="start-subtitle">Calculate how much you need in your final</div>
    <button id="startBtn" class="start-button">Start.</button>
  </div>

  <div id="mainContent" class="main-content hidden">
    <div class="container">
      <header class="header">
        <div class="logo">/calculy</div>  
        <nav class="nav">
          <a href="#"></a>
        </nav>
      </header>

      <div class="calculator-container" id="app"></div>

      <footer class="footer">
        <div class="footer-center">
          <div class="footer-credit">Created by <a href="https://www.linkedin.com/in/omar-garir/" target="_blank" class="footer-link">Omar Garir</a></div>
          <div class="footer-social">
            <a href="https://www.linkedin.com/in/omar-garir/" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://github.com/wispoflife" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
          </div>
        </div>
        <p class="copyright"></p>
      </footer>

  <script>
    let subjects = [];

    function uid() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    const multiInstanceTypes = ['Lab Test', 'Lab Tasks', 'Quiz', 'Assignment', 'Inclass Assignment'];
    const singleInstanceTypes = ['Project', 'Midterm'];

    const typesMeta = {
      'Project': { defaultMax: 100 },
      'Midterm': { defaultMax: 100 },
      'Lab Test': { defaultMax: 100 },
      'Lab Tasks': { defaultMax: 100 },
      'Quiz': { defaultMax: 10 },
      'Assignment': { defaultMax: 100 },
      'Inclass Assignment': { defaultMax: 20 }
    };

    const gradeBoundaries = [
      { letter: "A+", min: 94 },
      { letter: "A",  min: 90 },
      { letter: "A-", min: 86 },
      { letter: "B+", min: 82 },
      { letter: "B",  min: 78 },
      { letter: "B-", min: 74 },
      { letter: "C+", min: 70 },
      { letter: "C",  min: 65 },
      { letter: "C-", min: 60 },
      { letter: "D+", min: 55 },
      { letter: "D",  min: 50 }
    ];

    function createEmptySubject() {
  return { 
    id: uid(), 
    name: '', 
    finalWeight: 40,   
    components: [] 
  };
}

    function createComponent(type) {
      const meta = typesMeta[type];
      const isMulti = multiInstanceTypes.includes(type);
      if (isMulti) {
        return {
          id: uid(), type, weight: 0,
          bestY: null, bestX: null,
          instances: [{ id: uid(), score: 0, max: meta.defaultMax }]
        };
      } else {
        return {
          id: uid(), type, weight: 0,
          score: 0, maxPoints: meta.defaultMax
        };
      }
    }

    function computeComponentGrade(comp) {
      const isMulti = multiInstanceTypes.includes(comp.type);
      if (!isMulti) {
        if (comp.maxPoints === 0) return 0;
        return (comp.score / comp.maxPoints) * 100;
      } else {
        let percentages = comp.instances.map(inst => {
          if (inst.max === 0) return 0;
          return (inst.score / inst.max) * 100;
        });
        if (comp.bestY && comp.bestX && comp.bestY > 0 && comp.bestX >= comp.bestY) {
          const sorted = [...percentages].sort((a,b) => b - a);
          const top = sorted.slice(0, comp.bestY);
          if (top.length === 0) return 0;
          return top.reduce((a,b) => a + b, 0) / top.length;
        } else {
          if (percentages.length === 0) return 0;
          return percentages.reduce((a,b) => a + b, 0) / percentages.length;
        }
      }
    }

      function computeSubjectGrade(subject) {
        let total = 0;
        let componentWeightSum = 0;
        for (let comp of subject.components) {
          const grade = computeComponentGrade(comp);
          total += grade * comp.weight;
          componentWeightSum += comp.weight;
        }

        const finalWeight = subject.finalWeight || 0;
        const totalWeight = componentWeightSum + finalWeight;
        if (totalWeight === 0) return 0;
        return total / totalWeight;
      }

      function calculateFinalRequirements(subject) {
        const finalWeight = subject.finalWeight;
        if (finalWeight <= 0) return null;
        
        let totalWeight = 0;
        let weightedSum = 0;
        for (let comp of subject.components) {
          const grade = computeComponentGrade(comp);
          weightedSum += grade * comp.weight;
          totalWeight += comp.weight;
        }
        
        const currentOverall = totalWeight === 0 ? 0 : weightedSum / totalWeight;
        
        const requiredScores = [];
        for (let grade of gradeBoundaries) {
          const target = grade.min;

          const required = (target - currentOverall * (totalWeight / 100)) * (100 / finalWeight);
          let display, className;
          if (required > 100) {
            display = '-';
            className = 'impossible';
          } else if (required < 0) {
            display = '0';
            className = 'zero';
          } else {
            display = required.toFixed(1);
            className = '';
          }
          requiredScores.push({ grade: grade.letter, needed: display, className });
        }
        return { finalWeight, requiredScores };
      }

    function saveToLocalStorage() {
      localStorage.setItem('calculy_subjects', JSON.stringify(subjects));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('calculy_subjects');
      return saved ? JSON.parse(saved) : null;
    }

    function renderApp() {
      const container = document.getElementById('app');
      if (!container) return;
      container.innerHTML = '';
      
      subjects.forEach((subject) => {
        const card = document.createElement('div');
        card.className = 'subject-card';
        card.dataset.id = subject.id;

        const headerDiv = document.createElement('div');
        headerDiv.className = 'subject-header';
        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.value = subject.name;
        nameInput.placeholder = 'Enter Subject Name';
        nameInput.className = 'subject-title';
        nameInput.addEventListener('change', (e) => {
          subject.name = e.target.value;
          renderApp();
        });
        const weightWrapper = document.createElement('div');
        weightWrapper.style.display = 'flex';
        weightWrapper.style.alignItems = 'center';
        weightWrapper.style.gap = '0.3rem';

        const finalWeightLabel = document.createElement('span');
        finalWeightLabel.textContent = 'Final weight:';
        finalWeightLabel.style.fontSize = '0.75rem';
        finalWeightLabel.style.color = '#555';

        const finalWeightInput = document.createElement('input');
        finalWeightInput.type = 'number';
        finalWeightInput.step = '1';
        finalWeightInput.value = subject.finalWeight;
        finalWeightInput.placeholder = '';
        finalWeightInput.style.width = '80px';
        finalWeightInput.style.padding = '0.3rem 0.5rem';
        finalWeightInput.style.border = '1px solid #ddd';
        finalWeightInput.style.borderRadius = '2rem';
        finalWeightInput.style.fontFamily = 'inherit';
        finalWeightInput.style.textAlign = 'center';
        finalWeightInput.addEventListener('change', (e) => {
          subject.finalWeight = parseFloat(e.target.value) || 0;
          renderApp();
        });

        weightWrapper.appendChild(finalWeightLabel);
        weightWrapper.appendChild(finalWeightInput);
        headerDiv.appendChild(weightWrapper);
        const removeBtn = document.createElement('button');
        removeBtn.innerHTML = '✕';
        removeBtn.className = 'remove-subject';
        removeBtn.addEventListener('click', () => {
          subjects = subjects.filter(s => s.id !== subject.id);
          renderApp();
        });
        headerDiv.appendChild(nameInput);
        headerDiv.appendChild(removeBtn);
        card.appendChild(headerDiv);

        const compList = document.createElement('div');
        compList.className = 'components-list';
        
        subject.components.forEach(comp => {
          const compDiv = document.createElement('div');
          compDiv.className = 'component-item';
          
          const innerHeader = document.createElement('div');
          innerHeader.className = 'component-header';
          const typeSpan = document.createElement('span');
          typeSpan.className = 'component-type';
          typeSpan.innerText = comp.type;
          const weightInput = document.createElement('input');
          weightInput.type = 'number';
          weightInput.step = '0.1';
          weightInput.value = comp.weight;
          weightInput.className = 'component-weight';
          weightInput.addEventListener('change', (e) => {
            comp.weight = parseFloat(e.target.value) || 0;
            renderApp();
          });
          innerHeader.appendChild(typeSpan);
          const weightLabel = document.createElement('span');
          weightLabel.textContent = 'Weight:';
          weightLabel.style.fontSize = '0.75rem';
          weightLabel.style.color = '#555';
          weightLabel.style.marginLeft = '0.5rem';
          innerHeader.appendChild(weightLabel);
          innerHeader.appendChild(weightInput);
          
          const isMulti = multiInstanceTypes.includes(comp.type);
          if (isMulti) {
            const bestDiv = document.createElement('div');
            bestDiv.className = 'best-rule';
            bestDiv.innerHTML = `
              <span>best</span>
              <input type="number" id="bestY-${comp.id}" placeholder=" " step="1" min="1" style="width:55px">
              <span>out of</span>
              <input type="number" id="bestX-${comp.id}" placeholder=" " step="1" min="1" style="width:55px">
            `;
            const yInp = bestDiv.querySelector(`#bestY-${comp.id}`);
            const xInp = bestDiv.querySelector(`#bestX-${comp.id}`);
            if (comp.bestY) yInp.value = comp.bestY;
            if (comp.bestX) xInp.value = comp.bestX;
            yInp.addEventListener('change', (e) => {
              comp.bestY = parseInt(e.target.value) || null;
              renderApp();
            });
            xInp.addEventListener('change', (e) => {
              comp.bestX = parseInt(e.target.value) || null;
              renderApp();
            });
            innerHeader.appendChild(bestDiv);
          }
          compDiv.appendChild(innerHeader);
          
          const instancesArea = document.createElement('div');
          instancesArea.className = 'instances-area';
          
          if (isMulti) {
            comp.instances.forEach((inst, idxInst) => {
              const row = document.createElement('div');
              row.className = 'instance-row';
              row.innerHTML = `
                <span class="instance-label">#${idxInst+1}</span>
                <input type="number" step="any" class="instance-score" placeholder=" " value="${inst.score}">
                <span>/</span>
                <input type="number" step="any" class="instance-max" placeholder=" " value="${inst.max}">
                <button class="btn-small remove-instance" data-id="${inst.id}">✕</button>
              `;
              const scoreInp = row.querySelector('.instance-score');
              const maxInp = row.querySelector('.instance-max');
              scoreInp.addEventListener('change', (e) => {
                inst.score = parseFloat(e.target.value) || 0;
                renderApp();
              });
              maxInp.addEventListener('change', (e) => {
                inst.max = parseFloat(e.target.value) || 1;
                renderApp();
              });
              const rmBtn = row.querySelector('.remove-instance');
              rmBtn.addEventListener('click', () => {
                comp.instances = comp.instances.filter(i => i.id !== inst.id);
                if (comp.instances.length === 0) {
                  comp.instances.push({ id: uid(), score: 0, max: typesMeta[comp.type].defaultMax });
                }
                renderApp();
              });
              instancesArea.appendChild(row);
            });
            const addInstBtn = document.createElement('button');
            addInstBtn.innerText = '+ add instance';
            addInstBtn.className = 'add-instance';
            addInstBtn.addEventListener('click', () => {
              comp.instances.push({ id: uid(), score: 0, max: typesMeta[comp.type].defaultMax });
              renderApp();
            });
            instancesArea.appendChild(addInstBtn);
          } else {
            const row = document.createElement('div');
            row.className = 'instance-row';
            row.innerHTML = `
              <span class="instance-label">score</span>
              <input type="number" step="any" class="single-score" placeholder=" " value="${comp.score}">
              <span>/</span>
              <input type="number" step="any" class="single-max" placeholder=" " value="${comp.maxPoints}">
            `;
            const scoreInp = row.querySelector('.single-score');
            const maxInp = row.querySelector('.single-max');
            scoreInp.addEventListener('change', (e) => {
              comp.score = parseFloat(e.target.value) || 0;
              renderApp();
            });
            maxInp.addEventListener('change', (e) => {
              comp.maxPoints = parseFloat(e.target.value) || 1;
              renderApp();
            });
            instancesArea.appendChild(row);
          }
          compDiv.appendChild(instancesArea);
          
          const actions = document.createElement('div');
          actions.className = 'component-actions';
          const rmComp = document.createElement('button');
          rmComp.innerText = 'remove component';
          rmComp.className = 'btn-small';
          rmComp.addEventListener('click', () => {
            subject.components = subject.components.filter(c => c.id !== comp.id);
            renderApp();
          });
          actions.appendChild(rmComp);
          compDiv.appendChild(actions);
          compList.appendChild(compDiv);
        });
        card.appendChild(compList);
        
        const addCompDiv = document.createElement('div');
        addCompDiv.style.margin = '0.8rem 0';
        const typeSelect = document.createElement('select');
        typeSelect.className = 'component-type-select';
        const allTypes = [...singleInstanceTypes, ...multiInstanceTypes];
        allTypes.forEach(opt => {
          const option = document.createElement('option');
          option.value = opt;
          option.innerText = opt;
          typeSelect.appendChild(option);
        });
        const addCompBtn = document.createElement('button');
        addCompBtn.innerText = '+ add component';
        addCompBtn.className = 'add-instance';
        addCompBtn.style.marginLeft = '0.5rem';
        addCompBtn.addEventListener('click', () => {
          const newType = typeSelect.value;
          const newComp = createComponent(newType);
          subject.components.push(newComp);
          renderApp();
        });
        addCompDiv.appendChild(typeSelect);
        addCompDiv.appendChild(addCompBtn);
        card.appendChild(addCompDiv);
        
        const grade = computeSubjectGrade(subject);
        const gradeDisplay = document.createElement('div');
        gradeDisplay.className = 'grade-display';
        gradeDisplay.innerHTML = `<strong>Current grade: ${grade.toFixed(2)}%</strong>`;
        card.appendChild(gradeDisplay);
                
        const req = calculateFinalRequirements(subject);
        if (req) {
          const reqDiv = document.createElement('div');
          reqDiv.className = 'final-requirements';
          const title = document.createElement('div');
          title.className = 'final-title';
          title.innerHTML = `Final exam needed (final weight: ${req.finalWeight}%)`;
          reqDiv.appendChild(title);
          const tableDiv = document.createElement('div');
          tableDiv.className = 'req-table';
          req.requiredScores.forEach(r => {
            const item = document.createElement('div');
            item.className = 'req-item';
            item.innerHTML = `<span class="req-grade">${r.grade}:</span> <span class="req-score ${r.className}">${r.needed}%</span>`;
            tableDiv.appendChild(item);
          });
          reqDiv.appendChild(tableDiv);
          card.appendChild(reqDiv);
        }
        
        container.appendChild(card);
      });
      
      const addSubjectBtn = document.createElement('button');
      addSubjectBtn.innerText = '+ add subject';
      addSubjectBtn.className = 'add-subject-btn';
      addSubjectBtn.addEventListener('click', () => {
        subjects.push(createEmptySubject());
        renderApp();
      });
      container.appendChild(addSubjectBtn);
      
      saveToLocalStorage();
    }

    const overlay = document.getElementById('startOverlay');
    const mainContent = document.getElementById('mainContent');
    const startBtn = document.getElementById('startBtn');
    
    startBtn.addEventListener('click', () => {
      const saved = loadFromLocalStorage();
      subjects = (saved && Array.isArray(saved)) ? saved : [];
      
      overlay.classList.add('slide-down');
      setTimeout(() => {
        overlay.style.display = 'none';
        mainContent.classList.remove('hidden');
        mainContent.classList.add('slide-in');
        setTimeout(() => {
          mainContent.classList.remove('slide-in');
        }, 800);
        renderApp();
      }, 600);
    });
  </script>
</body>
</html>
